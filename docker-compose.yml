services:
  api:
    build: .
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-local}
      PORT: ${PORT:-8080}
      LLM_MODE: ${LLM_MODE:-litellm}
      PUBLISH_MODE: ${PUBLISH_MODE:-local}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-postgres}
      RAG_BACKEND: ${RAG_BACKEND:-postgres}
      DATABASE_URL: ${DATABASE_URL:-postgresql://reviewer:reviewer@postgres:5432/reviewer}
      AI_REVIEWER_TOKEN: ${AI_REVIEWER_TOKEN:-}
      UPSTAGE_API_KEY: ${UPSTAGE_API_KEY:-}
      UPSTAGE_API_BASE_URL: ${UPSTAGE_API_BASE_URL:-https://api.upstage.ai/v1}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SOLAR3_MODEL: ${SOLAR3_MODEL:-solar-pro3}
      SOLAR3_LOW_REASONING_EFFORT: ${SOLAR3_LOW_REASONING_EFFORT:-low}
      SOLAR3_MEDIUM_REASONING_EFFORT: ${SOLAR3_MEDIUM_REASONING_EFFORT:-medium}
      SOLAR3_HIGH_REASONING_EFFORT: ${SOLAR3_HIGH_REASONING_EFFORT:-high}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
      POLICY_ROOT: /app/policies
      LOCAL_DATA_DIR: /app/.local-data
      REVIEW_STORE_PATH: /app/.local-data/reviews.json
      COMMENT_OUTPUT_DIR: /app/.local-data/comments
    ports:
      - "127.0.0.1:${PORT:-8080}:${PORT:-8080}"
    volumes:
      - ./.local-data:/app/.local-data
      - ./policies:/app/policies:ro
    depends_on:
      - postgres

  caddy:
    image: caddy:2
    env_file:
      - .env
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env, e.g. a real domain or <ip-with-dashes>.sslip.io}
      APP_PORT: ${PORT:-8080}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reviewer}
      POSTGRES_USER: ${POSTGRES_USER:-reviewer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reviewer}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-reviewer} -d $${POSTGRES_DB:-reviewer}"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
