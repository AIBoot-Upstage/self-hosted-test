services:
  api:
    image: ${AI_REVIEWER_IMAGE}
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-staging}
      PORT: ${PORT:-8080}
      LLM_MODE: ${LLM_MODE:-litellm}
      PUBLISH_MODE: ${PUBLISH_MODE:-local}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-postgres}
      RAG_BACKEND: ${RAG_BACKEND:-postgres}
      DATABASE_URL: ${DATABASE_URL:-postgresql://reviewer:reviewer@postgres:5432/reviewer}
      AI_REVIEWER_TOKEN: ${AI_REVIEWER_TOKEN:-}
      UPSTAGE_API_KEY: ${UPSTAGE_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SOLAR3_MODEL: ${SOLAR3_MODEL:-solar3}
      SOLAR3_LOW_REASONING_EFFORT: ${SOLAR3_LOW_REASONING_EFFORT:-low}
      SOLAR3_MEDIUM_REASONING_EFFORT: ${SOLAR3_MEDIUM_REASONING_EFFORT:-medium}
      SOLAR3_HIGH_REASONING_EFFORT: ${SOLAR3_HIGH_REASONING_EFFORT:-high}
      POLICY_ROOT: /app/policies
      LOCAL_DATA_DIR: /app/.local-data
      REVIEW_STORE_PATH: /app/.local-data/reviews.json
      COMMENT_OUTPUT_DIR: /app/.local-data/comments
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - ./.local-data:/app/.local-data
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reviewer}
      POSTGRES_USER: ${POSTGRES_USER:-reviewer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reviewer}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-reviewer} -d $${POSTGRES_DB:-reviewer}"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
