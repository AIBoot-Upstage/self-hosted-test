name: Deploy to MacBook Staging

on:
  workflow_dispatch:
    inputs:
      llm_mode:
        description: "LLM mode for staging"
        required: true
        default: "litellm"
        type: choice
        options:
          - mock
          - litellm
      publish_mode:
        description: "Publish mode for staging"
        required: true
        default: "local"
        type: choice
        options:
          - local
          - github
  push:
    branches: [main]

env:
  MACBOOK_HOST: ${{ secrets.MACBOOK_HOST }}
  MACBOOK_USER: ${{ secrets.MACBOOK_USER }}
  MACBOOK_APP_DIR: ${{ vars.MACBOOK_APP_DIR || '/Users/Shared/ai-code-review-agent' }}
  STAGING_PORT: ${{ vars.STAGING_PORT || '8080' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

      - name: Local smoke review
        run: python -m backend.app.cli sample-data/review-request.json --sync-policies

  build_and_push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tags
        id: image
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          IMAGE_SHA="${IMAGE_NAME}:${GITHUB_SHA}"
          IMAGE_STAGING="${IMAGE_NAME}:staging"
          echo "image=${IMAGE_SHA}" >> "${GITHUB_OUTPUT}"
          echo "image_staging=${IMAGE_STAGING}" >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        env:
          GHCR_USER: ${{ vars.GHCR_USER || github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          test -n "${GHCR_TOKEN}" || (echo "GHCR_TOKEN or GITHUB_TOKEN is required" && exit 1)
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

      - name: Build image
        run: |
          docker build \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            -t "${{ steps.image.outputs.image }}" \
            -t "${{ steps.image.outputs.image_staging }}" \
            .

      - name: Push image
        run: |
          docker push "${{ steps.image.outputs.image }}"
          docker push "${{ steps.image.outputs.image_staging }}"

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    permissions:
      contents: read
      packages: read
    environment:
      name: macbook-staging

    steps:
      - uses: actions/checkout@v4

      - name: Validate required configuration
        env:
          MACBOOK_SSH_KEY: ${{ secrets.MACBOOK_SSH_KEY }}
        run: |
          test -n "${MACBOOK_HOST}" || (echo "MACBOOK_HOST secret is required" && exit 1)
          test -n "${MACBOOK_USER}" || (echo "MACBOOK_USER secret is required" && exit 1)
          test -n "${MACBOOK_SSH_KEY}" || (echo "MACBOOK_SSH_KEY secret is required" && exit 1)
          test -n "${{ secrets.TS_AUTHKEY }}" || (echo "TS_AUTHKEY secret is required" && exit 1)
          test -n "${{ secrets.AI_REVIEWER_TOKEN }}" || (echo "AI_REVIEWER_TOKEN secret is required" && exit 1)

      - name: Connect GitHub runner to tailnet
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          ping: ${{ env.MACBOOK_HOST }}

      - name: Prepare SSH key
        env:
          MACBOOK_SSH_KEY: ${{ secrets.MACBOOK_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          python - <<'PY'
          import base64
          import os
          import re
          from pathlib import Path

          raw_secret = os.getenv("MACBOOK_SSH_KEY", "").strip()
          if not raw_secret:
              raise SystemExit("MACBOOK_SSH_KEY is empty")

          candidate = raw_secret.replace("\\n", "\n")
          if "PRIVATE KEY" in candidate.splitlines()[0]:
              decoded = candidate
          elif candidate.startswith("ssh-"):
              raise SystemExit(
                  "MACBOOK_SSH_KEY must be a PRIVATE key, not the .pub file or raw public key"
              )
          else:
              key_b64 = re.sub(r"\s+", "", raw_secret)
              try:
                  decoded = base64.b64decode(key_b64, validate=True).decode("utf-8")
              except Exception as exc:
                  raise SystemExit(
                      "MACBOOK_SSH_KEY must be either a raw private key or "
                      "a base64-encoded private key"
                  ) from exc

          normalized = decoded.replace("\r\n", "\n").replace("\r", "\n").strip() + "\n"
          first_line = normalized.splitlines()[0] if normalized.splitlines() else ""
          if "PRIVATE KEY" not in first_line:
              raise SystemExit(
                  "MACBOOK_SSH_KEY must be the PRIVATE key or the base64 of the PRIVATE key, "
                  "not the .pub file or raw public key"
              )

          Path.home().joinpath(".ssh/id_ed25519").write_text(normalized, encoding="utf-8")
          PY
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null

      - name: Create staging env file
        env:
          AI_REVIEWER_IMAGE: ${{ needs.build_and_push.outputs.image }}
          INPUT_LLM_MODE: ${{ inputs.llm_mode || 'litellm' }}
          INPUT_PUBLISH_MODE: ${{ inputs.publish_mode || 'local' }}
          AI_REVIEWER_TOKEN: ${{ secrets.AI_REVIEWER_TOKEN }}
          UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}
          STAGING_GITHUB_TOKEN: ${{ secrets.STAGING_GITHUB_TOKEN }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB || 'reviewer' }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER || 'reviewer' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'reviewer' }}
          SOLAR3_MODEL: ${{ vars.SOLAR3_MODEL || 'solar3' }}
          SOLAR3_LOW_REASONING_EFFORT: ${{ vars.SOLAR3_LOW_REASONING_EFFORT || 'low' }}
          SOLAR3_MEDIUM_REASONING_EFFORT: ${{ vars.SOLAR3_MEDIUM_REASONING_EFFORT || 'medium' }}
          SOLAR3_HIGH_REASONING_EFFORT: ${{ vars.SOLAR3_HIGH_REASONING_EFFORT || 'high' }}
        run: |
          test -n "${AI_REVIEWER_IMAGE}" || (echo "AI_REVIEWER_IMAGE is required" && exit 1)

          if [ "${INPUT_LLM_MODE}" = "litellm" ]; then
            test -n "${UPSTAGE_API_KEY}" || (echo "UPSTAGE_API_KEY secret is required for litellm mode" && exit 1)
          fi

          if [ "${INPUT_PUBLISH_MODE}" = "github" ]; then
            test -n "${STAGING_GITHUB_TOKEN}" || (echo "STAGING_GITHUB_TOKEN secret is required for github publish mode" && exit 1)
          fi

          cat > /tmp/ai-code-review-agent.env <<ENV
          AI_REVIEWER_IMAGE=${AI_REVIEWER_IMAGE}
          APP_ENV=staging
          PORT=${STAGING_PORT}
          AI_REVIEWER_TOKEN=${AI_REVIEWER_TOKEN}
          LLM_MODE=${INPUT_LLM_MODE}
          PUBLISH_MODE=${INPUT_PUBLISH_MODE}
          STORAGE_BACKEND=postgres
          RAG_BACKEND=postgres
          POSTGRES_DB=${POSTGRES_DB}
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
          UPSTAGE_API_KEY=${UPSTAGE_API_KEY}
          GITHUB_TOKEN=${STAGING_GITHUB_TOKEN}
          SOLAR3_MODEL=${SOLAR3_MODEL}
          SOLAR3_LOW_REASONING_EFFORT=${SOLAR3_LOW_REASONING_EFFORT}
          SOLAR3_MEDIUM_REASONING_EFFORT=${SOLAR3_MEDIUM_REASONING_EFFORT}
          SOLAR3_HIGH_REASONING_EFFORT=${SOLAR3_HIGH_REASONING_EFFORT}
          POLICY_ROOT=policies
          LOCAL_DATA_DIR=.local-data
          REVIEW_STORE_PATH=.local-data/reviews.json
          COMMENT_OUTPUT_DIR=.local-data/comments
          ENV
          chmod 600 /tmp/ai-code-review-agent.env

      - name: Create GHCR Docker config
        env:
          GHCR_USER: ${{ vars.GHCR_USER || github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          test -n "${GHCR_TOKEN}" || (echo "GHCR_TOKEN or GITHUB_TOKEN is required" && exit 1)
          python - <<'PY'
          import base64
          import json
          import os
          from pathlib import Path

          user = os.environ["GHCR_USER"]
          token = os.environ["GHCR_TOKEN"]
          auth = base64.b64encode(f"{user}:{token}".encode("utf-8")).decode("ascii")
          payload = {"auths": {"ghcr.io": {"auth": auth}}, "credHelpers": {}}
          Path("/tmp/ai-code-review-agent-docker-config.json").write_text(
              json.dumps(payload),
              encoding="utf-8",
          )
          PY
          chmod 600 /tmp/ai-code-review-agent-docker-config.json

      - name: Upload deployment files to MacBook
        run: |
          scp \
            -o StrictHostKeyChecking=accept-new \
            /tmp/ai-code-review-agent.env \
            "${MACBOOK_USER}@${MACBOOK_HOST}:/tmp/ai-code-review-agent-${GITHUB_SHA}.env"
          scp \
            -o StrictHostKeyChecking=accept-new \
            /tmp/ai-code-review-agent-docker-config.json \
            "${MACBOOK_USER}@${MACBOOK_HOST}:/tmp/ai-code-review-agent-${GITHUB_SHA}.docker-config.json"
          scp \
            -o StrictHostKeyChecking=accept-new \
            infra/macbook-staging/docker-compose.yml \
            "${MACBOOK_USER}@${MACBOOK_HOST}:/tmp/ai-code-review-agent-${GITHUB_SHA}.compose.yml"

      - name: Deploy on MacBook
        run: |
          ssh -o StrictHostKeyChecking=accept-new "${MACBOOK_USER}@${MACBOOK_HOST}" \
            "MACBOOK_APP_DIR='${MACBOOK_APP_DIR}' \
             STAGING_PORT='${STAGING_PORT}' \
             STAGING_ENV_FILE='/tmp/ai-code-review-agent-${GITHUB_SHA}.env' \
             STAGING_COMPOSE_FILE='/tmp/ai-code-review-agent-${GITHUB_SHA}.compose.yml' \
             DOCKER_CONFIG_FILE='/tmp/ai-code-review-agent-${GITHUB_SHA}.docker-config.json' \
             bash -s" <<'REMOTE'
          set -euo pipefail
          export PATH="/Applications/Docker.app/Contents/Resources/bin:/opt/homebrew/bin:/usr/local/bin:${PATH}"

          mkdir -p "${MACBOOK_APP_DIR}"
          find "${MACBOOK_APP_DIR}" -mindepth 1 -maxdepth 1 \
            ! -name ".local-data" \
            ! -name ".docker-ci" \
            -exec rm -rf {} +

          cd "${MACBOOK_APP_DIR}"
          mkdir -p .local-data .docker-ci
          mv "${STAGING_ENV_FILE}" .env
          mv "${STAGING_COMPOSE_FILE}" docker-compose.yml
          mv "${DOCKER_CONFIG_FILE}" .docker-ci/config.json
          chmod 600 .env
          chmod 600 .docker-ci/config.json

          export DOCKER_CONFIG="${MACBOOK_APP_DIR}/.docker-ci"
          trap 'rm -f "${DOCKER_CONFIG}/config.json"' EXIT

          if docker --config "${DOCKER_CONFIG}" compose version >/dev/null 2>&1; then
            COMPOSE_CMD=(docker --config "${DOCKER_CONFIG}" compose)
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE_CMD=(env "DOCKER_CONFIG=${DOCKER_CONFIG}" docker-compose)
          else
            echo "Docker Compose is required. Install Docker Desktop compose plugin or docker-compose."
            exit 1
          fi

          "${COMPOSE_CMD[@]}" pull
          "${COMPOSE_CMD[@]}" up -d --no-build --remove-orphans
          "${COMPOSE_CMD[@]}" ps
          for attempt in {1..30}; do
            if curl -fsS "http://127.0.0.1:${STAGING_PORT}/healthz"; then
              break
            fi
            if [ "${attempt}" = "30" ]; then
              "${COMPOSE_CMD[@]}" logs --tail=120 api postgres
              exit 1
            fi
            sleep 2
          done
          REMOTE

      - name: Sync staging policies through Tailscale
        run: |
          curl -fsS \
            -X POST "http://${MACBOOK_HOST}:${STAGING_PORT}/v1/repositories/staging/policies/sync" \
            -H "Authorization: Bearer ${{ secrets.AI_REVIEWER_TOKEN }}"

      - name: Staging smoke review through Tailscale
        run: |
          curl -fsS \
            -X POST "http://${MACBOOK_HOST}:${STAGING_PORT}/v1/reviews" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.AI_REVIEWER_TOKEN }}" \
            --data @sample-data/review-request.json
