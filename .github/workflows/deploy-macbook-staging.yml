name: Deploy to MacBook Staging

on:
  workflow_dispatch:
    inputs:
      llm_mode:
        description: "LLM mode for staging"
        required: true
        default: "mock"
        type: choice
        options:
          - mock
          - litellm
      publish_mode:
        description: "Publish mode for staging"
        required: true
        default: "local"
        type: choice
        options:
          - local
          - github
  push:
    branches: [main]

env:
  MACBOOK_HOST: ${{ secrets.MACBOOK_HOST }}
  MACBOOK_USER: ${{ secrets.MACBOOK_USER }}
  MACBOOK_APP_DIR: ${{ vars.MACBOOK_APP_DIR || '/Users/Shared/ai-code-review-agent' }}
  STAGING_PORT: ${{ vars.STAGING_PORT || '8080' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

      - name: Local smoke review
        run: python -m backend.app.cli sample-data/review-request.json --sync-policies

  deploy:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    environment:
      name: macbook-staging

    steps:
      - uses: actions/checkout@v4

      - name: Validate required configuration
        env:
          MACBOOK_SSH_KEY: ${{ secrets.MACBOOK_SSH_KEY }}
        run: |
          test -n "${MACBOOK_HOST}" || (echo "MACBOOK_HOST secret is required" && exit 1)
          test -n "${MACBOOK_USER}" || (echo "MACBOOK_USER secret is required" && exit 1)
          test -n "${MACBOOK_SSH_KEY}" || (echo "MACBOOK_SSH_KEY secret is required" && exit 1)
          test -n "${{ secrets.TS_AUTHKEY }}" || (echo "TS_AUTHKEY secret is required" && exit 1)
          test -n "${{ secrets.AI_REVIEWER_TOKEN }}" || (echo "AI_REVIEWER_TOKEN secret is required" && exit 1)

      - name: Connect GitHub runner to tailnet
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          ping: ${{ env.MACBOOK_HOST }}

      - name: Prepare SSH key
        env:
          MACBOOK_SSH_KEY: ${{ secrets.MACBOOK_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          python - <<'PY'
          import base64
          import os
          import re
          from pathlib import Path

          raw_secret = os.getenv("MACBOOK_SSH_KEY", "").strip()
          if not raw_secret:
              raise SystemExit("MACBOOK_SSH_KEY is empty")

          candidate = raw_secret.replace("\\n", "\n")
          if "PRIVATE KEY" in candidate.splitlines()[0]:
              decoded = candidate
          elif candidate.startswith("ssh-"):
              raise SystemExit(
                  "MACBOOK_SSH_KEY must be a PRIVATE key, not the .pub file or raw public key"
              )
          else:
              key_b64 = re.sub(r"\s+", "", raw_secret)
              try:
                  decoded = base64.b64decode(key_b64, validate=True).decode("utf-8")
              except Exception as exc:
                  raise SystemExit(
                      "MACBOOK_SSH_KEY must be either a raw private key or "
                      "a base64-encoded private key"
                  ) from exc

          normalized = decoded.replace("\r\n", "\n").replace("\r", "\n").strip() + "\n"
          first_line = normalized.splitlines()[0] if normalized.splitlines() else ""
          if "PRIVATE KEY" not in first_line:
              raise SystemExit(
                  "MACBOOK_SSH_KEY must be the PRIVATE key or the base64 of the PRIVATE key, "
                  "not the .pub file or raw public key"
              )

          Path.home().joinpath(".ssh/id_ed25519").write_text(normalized, encoding="utf-8")
          PY
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null

      - name: Package current revision
        run: |
          tar \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='.venv' \
            --exclude='.local-data' \
            --exclude='.pytest_cache' \
            --exclude='.ruff_cache' \
            --exclude='.pip-cache' \
            --exclude='ai_code_review_agent.egg-info' \
            --exclude='__pycache__' \
            -czf /tmp/ai-code-review-agent.tgz .

      - name: Create staging env file
        env:
          INPUT_LLM_MODE: ${{ inputs.llm_mode || 'mock' }}
          INPUT_PUBLISH_MODE: ${{ inputs.publish_mode || 'local' }}
          AI_REVIEWER_TOKEN: ${{ secrets.AI_REVIEWER_TOKEN }}
          UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}
          STAGING_GITHUB_TOKEN: ${{ secrets.STAGING_GITHUB_TOKEN }}
        run: |
          if [ "${INPUT_LLM_MODE}" = "litellm" ]; then
            test -n "${UPSTAGE_API_KEY}" || (echo "UPSTAGE_API_KEY secret is required for litellm mode" && exit 1)
          fi

          if [ "${INPUT_PUBLISH_MODE}" = "github" ]; then
            test -n "${STAGING_GITHUB_TOKEN}" || (echo "STAGING_GITHUB_TOKEN secret is required for github publish mode" && exit 1)
          fi

          cat > /tmp/ai-code-review-agent.env <<ENV
          APP_ENV=staging
          PORT=${STAGING_PORT}
          AI_REVIEWER_TOKEN=${AI_REVIEWER_TOKEN}
          LLM_MODE=${INPUT_LLM_MODE}
          PUBLISH_MODE=${INPUT_PUBLISH_MODE}
          UPSTAGE_API_KEY=${UPSTAGE_API_KEY}
          GITHUB_TOKEN=${STAGING_GITHUB_TOKEN}
          SOLAR3_LOW_MODEL=solar3-low
          SOLAR3_MEDIUM_MODEL=solar3-medium
          SOLAR3_HIGH_MODEL=solar3-high
          POLICY_ROOT=policies
          LOCAL_DATA_DIR=.local-data
          REVIEW_STORE_PATH=.local-data/reviews.json
          COMMENT_OUTPUT_DIR=.local-data/comments
          ENV
          chmod 600 /tmp/ai-code-review-agent.env

      - name: Upload release bundle to MacBook
        run: |
          scp \
            -o StrictHostKeyChecking=accept-new \
            /tmp/ai-code-review-agent.tgz \
            "${MACBOOK_USER}@${MACBOOK_HOST}:/tmp/ai-code-review-agent-${GITHUB_SHA}.tgz"
          scp \
            -o StrictHostKeyChecking=accept-new \
            /tmp/ai-code-review-agent.env \
            "${MACBOOK_USER}@${MACBOOK_HOST}:/tmp/ai-code-review-agent-${GITHUB_SHA}.env"

      - name: Deploy on MacBook
        run: |
          ssh -o StrictHostKeyChecking=accept-new "${MACBOOK_USER}@${MACBOOK_HOST}" \
            "MACBOOK_APP_DIR='${MACBOOK_APP_DIR}' \
             RELEASE_ARCHIVE='/tmp/ai-code-review-agent-${GITHUB_SHA}.tgz' \
             STAGING_PORT='${STAGING_PORT}' \
             STAGING_ENV_FILE='/tmp/ai-code-review-agent-${GITHUB_SHA}.env' \
             bash -s" <<'REMOTE'
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:${PATH}"

          mkdir -p "${MACBOOK_APP_DIR}"
          find "${MACBOOK_APP_DIR}" -mindepth 1 -maxdepth 1 \
            ! -name ".env" \
            ! -name ".local-data" \
            -exec rm -rf {} +
          tar -xzf "${RELEASE_ARCHIVE}" -C "${MACBOOK_APP_DIR}"
          rm -f "${RELEASE_ARCHIVE}"

          cd "${MACBOOK_APP_DIR}"
          mkdir -p .local-data
          mv "${STAGING_ENV_FILE}" .env
          chmod 600 .env

          docker compose up --build -d
          docker compose ps
          curl -fsS "http://127.0.0.1:${STAGING_PORT}/healthz"
          REMOTE

      - name: Staging smoke review through Tailscale
        run: |
          curl -fsS \
            -X POST "http://${MACBOOK_HOST}:${STAGING_PORT}/v1/reviews" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.AI_REVIEWER_TOKEN }}" \
            --data @sample-data/review-request.json
