name: Deploy to GCP Cloud Run

on:
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION || 'asia-northeast3' }}
  ARTIFACT_REPOSITORY: ${{ vars.ARTIFACT_REPOSITORY || 'ai-reviewer' }}
  CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'ai-code-review-agent' }}
  GITHUB_APP_ID: ${{ vars.GITHUB_APP_ID }}
  GITHUB_WEBHOOK_REVIEW_MODE: ${{ vars.GITHUB_WEBHOOK_REVIEW_MODE || 'after_checks' }}
  GITHUB_CHECK_RUN_NAME: ${{ vars.GITHUB_CHECK_RUN_NAME || 'AI Code Review' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate deployment configuration
        run: |
          test -n "${GCP_PROJECT_ID}" || (echo "GCP_PROJECT_ID variable이 필요합니다" && exit 1)
          test -n "${GITHUB_APP_ID}" || (echo "GITHUB_APP_ID variable이 필요합니다" && exit 1)

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build image
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPOSITORY}/${CLOUD_RUN_SERVICE}:${GITHUB_SHA}"
          docker build -t "${IMAGE}" .
          echo "IMAGE=${IMAGE}" >> "${GITHUB_ENV}"

      - name: Push image
        run: docker push "${IMAGE}"

      - name: Deploy Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.IMAGE }}
          env_vars: |
            APP_ENV=prod
            LLM_MODE=litellm
            PUBLISH_MODE=github_app
            UPSTAGE_API_BASE_URL=https://api.upstage.ai/v1
            SOLAR3_MODEL=solar-pro3
            GITHUB_WEBHOOK_REVIEW_MODE=${{ env.GITHUB_WEBHOOK_REVIEW_MODE }}
            GITHUB_CHECK_RUN_NAME=${{ env.GITHUB_CHECK_RUN_NAME }}
            GITHUB_APP_ID=${{ env.GITHUB_APP_ID }}
            GITHUB_API_BASE_URL=https://api.github.com
            POLICY_ROOT=/app/policies
          secrets: |
            AI_REVIEWER_TOKEN=AI_REVIEWER_TOKEN:latest
            UPSTAGE_API_KEY=UPSTAGE_API_KEY:latest
            GITHUB_WEBHOOK_SECRET=GITHUB_WEBHOOK_SECRET:latest
            GITHUB_APP_PRIVATE_KEY=GITHUB_APP_PRIVATE_KEY:latest
