review:
  high_risk_paths:
    - "auth/"
    - "security/"
    - "migrations/"
    - ".github/workflows/"
  large_diff_lines: 600
  large_diff_files: 20

models:
  low: "${SOLAR3_LOW_MODEL}"
  medium: "${SOLAR3_MEDIUM_MODEL}"
  high: "${SOLAR3_HIGH_MODEL}"

policies:
  root: "policies"
  include:
    - "*.md"
    - "**/*.md"

